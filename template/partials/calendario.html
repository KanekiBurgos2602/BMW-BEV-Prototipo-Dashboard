<div class="surface">
  <div class="surface-pad cal-wrap">
    <div class="panel cal-panel">
      <div class="panel-vignette"></div>
      <div class="panel-header">
        <div class="title-group">
          <div class="icon-box">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#E0473B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="16.5" rx="2"></rect><path d="M3 9.5h18"></path><path d="M8 2.5v4"></path><path d="M16 2.5v4"></path></svg>
          </div>
          <div class="panel-title">CALENDARIO</div>
        </div>
        <div class="online-badge"><span class="dot"></span><span class="label">ONLINE</span></div>
      </div>
      <div class="led-divider" style="margin:10px 0"></div>
      <div class="cal-legend">
        <div class="item"><span class="swatch optimal"></span><span class="txt">OPTIMAL</span></div>
        <div class="item"><span class="swatch incident"></span><span class="txt">INCIDENT</span></div>
        <div class="item"><span class="swatch scheduled"></span><span class="txt">SCHEDULED</span></div>
      </div>
      <div class="cal-grid"></div>
    </div>
  </div>
</div>

<template id="tpl-cal-col">
  <div class="cal-col">
    <div class="col-head"><div class="glyph-box"><span class="glyph"></span></div><div class="col-label"></div></div>
    <div class="month"></div>
    <div class="letter"></div>
  </div>
</template>

<template id="tpl-cal-day">
  <div class="day">
    <div class="face"><div class="scan"></div><div class="gloss"></div><div class="num"></div></div>
  </div>
</template>

<template id="tpl-cal-modal">
  <div class="cal-modal">
    <div class="sheet">
      <div class="m-head">
        <div class="l">
          <div class="m-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v5c0 4.5-3 7.6-7 9-4-1.4-7-4.5-7-9V6l7-3z"></path><path d="M9 12l2 2 4-4"></path></svg>
          </div>
          <div><div class="m-title"></div><div class="m-sub"></div></div>
        </div>
        <button class="m-close">✕</button>
      </div>
      <div class="m-legend"></div>
      <div class="plot-box">
        <div class="plot-head">
          <div class="metric-title"></div>
          <div class="stats">
            <div class="stat stat-good"><span class="v"></span><span class="k"></span></div>
            <div class="stat"><span class="v streak"></span><span class="k">RACHA MÁX</span></div>
            <div class="stat stat-bad"><span class="v"></span><span class="k"></span></div>
          </div>
        </div>
        <div class="plot"></div>
        <div class="xaxis"></div>
        <div class="month-lbl"></div>
        <div class="hint">Sin barra · día sin incidente · barra de color · día con evento (pasa el cursor) · varias barras · varios eventos el mismo día</div>
      </div>
      <div class="evlist"></div>
    </div>
  </div>
</template>

<template id="tpl-cal-legitem">
  <div class="item"><span class="sw"></span><span class="lb"></span></div>
</template>

<template id="tpl-cal-plotcol">
  <div class="col has">
    <div class="bars"></div>
    <div class="tip">
      <div class="tday"><span></span></div>
      <div class="arrow"></div>
    </div>
  </div>
</template>

<template id="tpl-cal-tipev">
  <div class="ev"><div class="short"></div><div class="desc"></div><div class="meta"></div></div>
</template>

<template id="tpl-cal-evrow">
  <div class="evrow">
    <div class="day-lbl"></div>
    <div class="evrow-body"><div class="type"></div><div class="desc"></div><div class="meta"></div></div>
  </div>
</template>
