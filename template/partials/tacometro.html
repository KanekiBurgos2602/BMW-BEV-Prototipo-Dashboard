{# ============================================================
   tacometro.html — markup del tacómetro de operador.
   El JS (tacometro.js) clona #tpl-taco y solo rellena datos +
   genera la geometría del gauge; aquí vive todo el HTML/SVG.
   ============================================================ #}
<template id="tpl-taco">
  <div class="taco">
    <div class="dial">
      <div class="face-carbon"></div>
      <div class="screw tl"></div><div class="screw tr"></div><div class="screw bl"></div><div class="screw br"></div>
      <svg class="gauge" viewBox="0 0 200 200">
        <defs>
          <radialGradient id="opTail" gradientUnits="userSpaceOnUse" cx="100" cy="118" r="14">
            <stop offset="0" stop-color="#3a2422"></stop>
            <stop offset="1" stop-color="#100a0b"></stop>
          </radialGradient>
        </defs>
        <circle cx="100" cy="100" r="91" fill="none" stroke="#22E62C55" stroke-width="1.3"></circle>
        <circle cx="100" cy="100" r="89.9" fill="none" stroke="rgba(255,150,140,.10)" stroke-width="0.6"></circle>
        <circle cx="100" cy="100" r="83" fill="none" stroke="rgba(255,150,140,.07)" stroke-width="0.6"></circle>
        <circle cx="100" cy="100" r="88" fill="none" stroke="#1d1a1c" stroke-width="5" stroke-linecap="round" stroke-dasharray="399.33 552.92" transform="rotate(140 100 100)"></circle>
        <circle class="arc-glow" cx="100" cy="100" r="88" fill="none" stroke="#22E62C" stroke-width="8" stroke-linecap="round" stroke-dasharray="0 552.92" transform="rotate(140 100 100)" style="filter:drop-shadow(0 0 5px #22E62C) drop-shadow(0 0 12px #22E62C)"></circle>
        <circle class="arc-white" cx="100" cy="100" r="88" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="2.4" stroke-linecap="round" stroke-dasharray="0 552.92" transform="rotate(140 100 100)"></circle>
        <g class="ticks"></g>
        <circle cx="100" cy="100" r="54" fill="none" stroke="#22E62C" stroke-width="1.6" style="filter:drop-shadow(0 0 3px #22E62C)"></circle>
        <circle cx="100" cy="100" r="52.4" fill="none" stroke="rgba(255,255,255,.32)" stroke-width="0.7"></circle>
        <circle cx="100" cy="100" r="56" fill="none" stroke="rgba(0,0,0,.5)" stroke-width="1"></circle>
        <circle class="tip" cx="100" cy="12" r="2.6" fill="#ffffff" style="filter:drop-shadow(0 0 4px #22E62C) drop-shadow(0 0 9px #22E62C)"></circle>
        <g class="needle">
          <polygon points="100,100 97.6,100 98.6,123 101.4,123 102.4,100" fill="url(#opTail)"></polygon>
          <ellipse cx="100" cy="122" rx="4.3" ry="5.6" fill="#241616" stroke="#5a2f2c" stroke-width="0.8"></ellipse>
          <polygon points="100,30 97.4,66 102.6,66" fill="#22E62C" style="filter:drop-shadow(0 1px 2px rgba(0,0,0,.7)) drop-shadow(0 0 5px #22E62C)"></polygon>
          <polygon points="100,30 99.2,42 100.8,42" fill="#FFFFFF"></polygon>
        </g>
      </svg>
      <div class="glass"></div>
      <div class="center">
        <div class="ring">
          <div class="initials"></div>
          <div class="halo"></div>
        </div>
        <div class="chip"><span class="d"></span><span class="t">EN LÍNEA</span></div>
      </div>
    </div>
    <div class="identity">
      <div class="badges"><span class="role"></span></div>
      <div class="name"></div>
      <span class="opnum"></span>
      <div class="meta"><span class="station"></span></div>
    </div>
  </div>
</template>
